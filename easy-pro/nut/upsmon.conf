# /etc/nut/upsmon.conf
# Monitoramento e shutdown automático

# IMPORTANTE: substituir TROCAR_SENHA_UPSMON pela senha real do upsd.users
MONITOR ragtech@localhost 1 upsmon TROCAR_SENHA_UPSMON master

MINSUPPLIES 1
SHUTDOWNCMD "/usr/local/bin/proxmox-graceful-shutdown.sh"
POLLFREQ 5
POLLFREQALERT 5
HOSTSYNC 15
DEADTIME 15
POWERDOWNFLAG /etc/killpower
FINALDELAY 5

# Notificações (opcional)
# NOTIFYCMD "/usr/local/bin/upsmon-notify.sh"
# NOTIFYFLAG ONBATT  SYSLOG+EXEC
# NOTIFYFLAG LOWBATT SYSLOG+EXEC
# NOTIFYFLAG ONLINE  SYSLOG+EXEC
