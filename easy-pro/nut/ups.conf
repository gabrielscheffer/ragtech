# /etc/nut/ups.conf
# Configuração do NUT para ler do arquivo gerado pelo bridge Python.
#
# O driver dummy-ups lê do arquivo .dev e expõe os dados para o NUT
# como se fosse um nobreak nativo. Isso permite shutdown automático,
# notificações, e integração com qualquer ferramenta compatível com NUT.

maxretry = 3
pollinterval = 5

[ragtech]
    driver = dummy-ups
    port = ragtech.dev
    desc = "Ragtech Easy Pro 1200VA"
    # Modo "dummy" — relê o arquivo a cada pollinterval segundos
    mode = dummy
